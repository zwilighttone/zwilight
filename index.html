<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Zwilight Tone - Electronic and Visual Experimentations</title>

<style>
:root{
  --neon:#00ffff;
  --purple:#BC13FE;
  --magenta:#ff2479;
  --bg:#07050c;
  --box:max(260px, min(78vw, 520px));
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}

body{
  font-family:system-ui;
  color:#f5f5ff;
  background:linear-gradient(180deg,#05040a,#07050c);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* MAIN */
.page-wrap{
  width:100%;
  max-width:900px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}

.main-title{
  font-size:28px;
  letter-spacing:.25em;
  text-transform:uppercase;
}

.subnav{
  display:flex;
  gap:10px;
  font-size:12px;
  letter-spacing:.2em;
  text-transform:uppercase;
}

.subnav a{
  cursor:pointer;
  color:#fff;
  position:relative;
}

.subnav a:hover{
  color:var(--neon);
}

.subnav-sep{opacity:.4}

/* GLITCH BOX */
.glitch-main{
  width:var(--box);
  aspect-ratio:1;
  position:relative;
  overflow:hidden;
  border-radius:20px;
  border:2px solid var(--neon);
  box-shadow:0 0 25px rgba(0,255,255,.6);
}

.glitch-img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:.85;
}

/* FLASH EFFECT */
.flash-screen{
  position:fixed;
  inset:0;
  background:#fff;
  opacity:0;
  pointer-events:none;
  z-index:998;
}

.flash-screen.active{
  animation:flashBurst .35s ease;
}

@keyframes flashBurst{
  0%{opacity:0}
  20%{opacity:.9}
  100%{opacity:0}
}

/* MODAL */
.modal-overlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-overlay.active{
  display:flex;
}

/* STATIC BACKGROUND */
.modal-overlay::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.06) 0px,
      rgba(255,255,255,.06) 1px,
      transparent 3px,
      transparent 5px
    );
  animation:staticMove 6s linear infinite;
  opacity:.35;
  mix-blend-mode:screen;
}

@keyframes staticMove{
  0%{transform:translateY(0)}
  100%{transform:translateY(20px)}
}

.modal-content{
  width:90%;
  height:85%;
  background:#000;
  border:1px solid var(--neon);
  position:relative;
  box-shadow:
    0 0 25px rgba(0,255,255,.7),
    0 0 80px rgba(188,19,254,.5);
  animation:modalGlitch .35s ease;
}

/* GLITCH ENTRY */
@keyframes modalGlitch{
  0%{
    transform:scale(.9) skewX(8deg);
    opacity:0;
  }
  30%{
    transform:scale(1.02) skewX(-4deg);
  }
  60%{
    transform:scale(.98) skewX(2deg);
  }
  100%{
    transform:scale(1) skewX(0);
    opacity:1;
  }
}

.modal-content iframe{
  width:100%;
  height:100%;
}

#closeModal{
  position:absolute;
  top:10px;
  right:12px;
  background:none;
  border:none;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  z-index:2;
}

.footer{
  margin-top:30px;
  font-size:11px;
  letter-spacing:.2em;
  text-transform:uppercase;
  opacity:.7;
}
</style>
</head>

<body>

<div class="flash-screen" id="flash"></div>

<div class="page-wrap">

<div class="main-title">ZWILIGHT TONE</div>

<div class="subnav">
  <a data-page="zwilight.html">UPDATES</a>
  <span class="subnav-sep">•</span>
  <a data-page="audio.html">AUDIO</a>
  <span class="subnav-sep">•</span>
  <a data-page="visual.html">VISUAL</a>
  <span class="subnav-sep">•</span>
  <a data-page="other.html">OTHER</a>
</div>

<div class="glitch-main">
  <img src="https://zwilighttone.github.io/zwilight/mk2.jpg" class="glitch-img">
</div>

<div class="footer">
© 2026 All Rights Reserved
</div>

</div>

<!-- MODAL -->
<div id="modalOverlay" class="modal-overlay">
  <div class="modal-content">
    <button id="closeModal">✕</button>
    <iframe id="modalFrame"></iframe>
  </div>
</div>

<script>

const links = document.querySelectorAll("[data-page]");
const modal = document.getElementById("modalOverlay");
const frame = document.getElementById("modalFrame");
const closeBtn = document.getElementById("closeModal");
const flash = document.getElementById("flash");

links.forEach(link=>{
  link.addEventListener("click",()=>{

    // FLASH FIRST
    flash.classList.add("active");

    setTimeout(()=>{
      frame.src = "https://zwilighttone.github.io/zwilight/" + link.dataset.page;
      modal.classList.add("active");
    },120);

    setTimeout(()=>{
      flash.classList.remove("active");
    },300);

  });
});

function closeModal(){
  modal.classList.remove("active");
  frame.src = "";
}

closeBtn.onclick = closeModal;

modal.addEventListener("click",(e)=>{
  if(e.target === modal){
    closeModal();
  }
});

</script>

</body>
</html>
