<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elayna.Studio</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">

<style>

:root{
  --pink:#F3A6D6;
  --pink2:#E98BC2;
  --purple:#A855F7;
  --teal:#4FD1C5;
}

body{
  margin:0;
  font-family:'Quicksand',sans-serif;
  background:#060606;
  color:white;
  overflow-x:hidden;
}

/* ===== BACKGROUND GLOW ===== */

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(168,85,247,0.25), transparent 40%),
    radial-gradient(circle at 80% 60%, rgba(79,209,197,0.25), transparent 40%),
    radial-gradient(circle at 50% 80%, rgba(243,166,214,0.25), transparent 50%);
  animation:flowBG 20s linear infinite alternate;
  z-index:-1;
}

@keyframes flowBG{
  0%{transform:translateY(0px)}
  100%{transform:translateY(-40px)}
}

/* ===== TOP BANNER ===== */

.banner{
  text-align:center;
  padding:30px 0 10px;
}

.banner img{
  max-width:420px;
  width:80%;
  filter: drop-shadow(0 0 20px rgba(168,85,247,0.4))
          drop-shadow(0 0 30px rgba(79,209,197,0.3));
}

/* ===== SUBHEADER ===== */

.subheader{
  text-align:center;
  font-family:'Great Vibes',cursive;
  font-size:32px;
  margin-top:10px;
  color:var(--pink);
  text-shadow:
    0 0 10px rgba(243,166,214,0.6),
    0 0 20px rgba(168,85,247,0.4);
  animation:softGlow 6s ease-in-out infinite;
}

@keyframes softGlow{
  0%,100%{opacity:0.8}
  50%{opacity:1}
}

/* ===== CAROUSEL ===== */

.carousel{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:18px;
  margin:50px auto;
}

.panel{
  border-radius:28px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  backdrop-filter: blur(18px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

/* sizes */
.small{width:110px;height:200px;}
.medium{width:150px;height:260px;}
.large{
  width:230px;height:360px;
  transform:translateY(-20px);
}

/* animated gradient layer */
.panel::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(120deg,
      rgba(243,166,214,0.3),
      rgba(168,85,247,0.25),
      rgba(79,209,197,0.25),
      rgba(243,166,214,0.3));
  background-size:300% 300%;
  animation:wave 12s ease infinite;
}

@keyframes wave{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* shimmer */
.panel::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg, transparent 40%, rgba(255,255,255,0.25), transparent 60%);
  opacity:0;
  animation:shine 5s infinite;
}

@keyframes shine{
  0%{transform:translateX(-100%);opacity:0}
  50%{opacity:.4}
  100%{transform:translateX(100%);opacity:0}
}

/* ===== INFO CARDS ===== */

.info-row{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  width:90%;
  margin:40px auto;
}

.info-box{
  padding:20px;
  border-radius:24px;
  backdrop-filter: blur(16px);
  background:
    linear-gradient(145deg, rgba(243,166,214,0.18), rgba(168,85,247,0.1)),
    rgba(255,255,255,0.08);
  border:1px solid rgba(243,166,214,0.25);
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
  animation:float 8s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.info-box h3{
  margin-bottom:10px;
  color:white;
}

.info-box p{
  color:#eee;
  font-size:14px;
}

/* ===== MODAL ===== */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:rgba(20,20,20,0.8);
  padding:30px;
  border-radius:20px;
  backdrop-filter: blur(20px);
}

button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:linear-gradient(90deg,var(--pink),var(--purple));
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="banner">
  <img src="Elayna_Studio_Top.png">
</div>

<div class="subheader">Handmade Jewelry</div>

<!-- CAROUSEL -->
<div class="carousel">
  <div class="panel small"></div>
  <div class="panel medium"></div>
  <div class="panel large" onclick="openModal()"></div>
  <div class="panel medium"></div>
  <div class="panel small"></div>
</div>

<!-- INFO -->
<div class="info-row">
  <div class="info-box">
    <h3>About</h3>
    <p>Handcrafted pieces inspired by nature and imagination.</p>
  </div>
  <div class="info-box">
    <h3>Materials</h3>
    <p>Carefully selected components with artistic detail.</p>
  </div>
  <div class="info-box">
    <h3>Shop</h3>
    <p>Browse and discover unique handmade creations.</p>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Item Name</h2>
    <p>Description goes here.</p>
    <button>Purchase</button>
  </div>
</div>

<script>
function openModal(){
  document.getElementById("modal").style.display="flex";
}
window.onclick = function(e){
  if(e.target.classList.contains('modal')){
    e.target.style.display="none";
  }
}
</script>

</body>
</html>
